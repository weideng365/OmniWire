name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Copy frontend to embed path
        run: cp -r server/resource/public server/internal/packed/public

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          cd server
          go build -tags embed -ldflags="-s -w -X omniwire/internal/cmd.AppVersion=${{ github.ref_name }}" \
            -o ../dist/omniwire-${{ matrix.suffix }} main.go

      - uses: actions/upload-artifact@v4
        with:
          name: omniwire-${{ matrix.suffix }}
          path: dist/omniwire-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## OmniWire ${{ github.ref_name }}

            网络安全网关系统，提供 WireGuard VPN 服务器管理、TCP/UDP 端口转发和端口监控功能。

            ### 下载说明
            | 文件 | 平台 |
            |------|------|
            | `omniwire-linux-amd64` | Linux x86_64 |
            | `omniwire-linux-arm64` | Linux ARM64 |
            | `omniwire-windows-amd64.exe` | Windows x86_64 |

            ### 使用方法
            1. 下载对应平台的二进制文件
            2. 运行 `./omniwire`（Linux 需先 `chmod +x`）
            3. 访问 `http://localhost:8110`，默认账号 `admin` / `admin123`

